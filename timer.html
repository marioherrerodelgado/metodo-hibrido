<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f5f3">
<title>Timer WOD - Método Híbrido</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<style>
:root{--bg:#f5f5f3;--sf:#fff;--bd:#e8e8e6;--t:#111;--t2:#555;--t3:#999;--bl:#007aff;--gr:#34c759;--or:#ff9500;--rd:#ff3b30;--r:18px;--rs:12px;--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px calc(24px + var(--sb))}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.back{border:1px solid var(--bd);background:var(--sf);color:var(--t2);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;text-decoration:none}
.title{font-size:28px;font-weight:700;letter-spacing:-.6px}
.sub{font-size:13px;color:var(--t3);margin-top:2px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-top:12px}
.modes{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.modes::-webkit-scrollbar{display:none}
.mode{flex-shrink:0;border:1px solid var(--bd);background:var(--bg);color:var(--t2);border-radius:16px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.mode.on{background:var(--t);color:#fff;border-color:var(--t)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.f{display:flex;flex-direction:column;gap:6px}
.f.full{grid-column:1/-1}
.lbl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase}
.inp{width:100%;border:1px solid var(--bd);background:var(--bg);border-radius:10px;padding:11px 12px;font-size:15px;outline:none}
.btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.btn.start{background:var(--t);color:#fff;margin-top:12px}
.btn.ghost{background:var(--bg);color:var(--t2);border:1px solid var(--bd)}
.screen{display:none;text-align:center}
.screen.on{display:block}
.phase{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--t3);text-transform:uppercase}
.big{font-size:74px;line-height:1;font-weight:700;letter-spacing:-2px;margin-top:6px}
.round{font-size:14px;color:var(--t2);margin-top:6px}
.bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:14px}
.fill{height:100%;background:var(--bl);width:0%;transition:width .9s linear}
.ctrls{display:flex;gap:8px;margin-top:14px}
.ctrls .btn{flex:1}
.chip{display:inline-block;padding:4px 10px;border-radius:999px;background:rgba(0,122,255,.1);color:var(--bl);font-size:11px;font-weight:700;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">Volver a la app</a>
  </div>
  <div class="title">Timer WOD</div>
  <div class="sub">Método Híbrido</div>

  <div class="card" id="setup">
    <div class="modes" id="modes">
      <button class="mode on" data-mode="tabata">Tabata</button>
      <button class="mode" data-mode="amrap">AMRAP</button>
      <button class="mode" data-mode="emom">EMOM</button>
      <button class="mode" data-mode="countdown">Cuenta atrás</button>
    </div>
    <div class="grid" id="fields"></div>
    <button class="btn start" id="startBtn">Iniciar</button>
  </div>

  <div class="card screen" id="timer">
    <div class="phase" id="phase">Prepárate</div>
    <div class="big" id="time">3</div>
    <div class="round" id="round"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="ctrls">
      <button class="btn ghost" id="pauseBtn">Pausar</button>
      <button class="btn ghost" id="stopBtn">Parar</button>
    </div>
  </div>

  <div class="card screen" id="finish">
    <div class="phase">Completado</div>
    <div class="big" style="font-size:52px">¡Buen trabajo!</div>
    <div class="chip" id="finishMsg">Sesión terminada</div>
    <div style="margin-top:12px"><button class="btn start" id="againBtn">Nuevo timer</button></div>
  </div>
</div>

<script>
const modes = {
  tabata:    [["rounds","Rounds",8],["work","Trabajo (seg)",20],["rest","Descanso (seg)",10]],
  amrap:     [["mins","Minutos",12]],
  emom:      [["roundMins","Min por ronda",1],["rounds","Rondas",10]],
  countdown: [["mins","Minutos",5],["secs","Segundos",0]],
};

let mode = "tabata", cfg = {}, intv = null, paused = false,
    phase = "prep", left = 0, dur = 0, round = 1, total = 1;

const $ = id => document.getElementById(id);

function renderFields() {
  $("fields").innerHTML = modes[mode].map(([id, lbl, val]) =>
    `<div class="f"><label class="lbl">${lbl}</label><input class="inp" id="${id}" type="number" min="1" value="${val}"></div>`
  ).join("");
}

function fmt(s) {
  const m = Math.floor(s / 60), x = s % 60;
  return `${String(m).padStart(2,"0")}:${x < 10 ? "0" : ""}${x}`;
}

function setView(v) {
  ["setup","timer","finish"].forEach(id => $(id).classList.remove("on"));
  $("setup").style.display = v === "setup" ? "block" : "none";
  $(v).classList.add("on");
}

function readCfg() {
  const g = id => parseInt(document.getElementById(id)?.value || 0, 10) || 0;
  if (mode === "tabata")    return { rounds: g("rounds") || 8, work: g("work") || 20, rest: g("rest") || 10 };
  if (mode === "amrap")     return { total: (g("mins") || 12) * 60 };
  if (mode === "emom")      return { roundSecs: (g("roundMins") || 1) * 60, rounds: g("rounds") || 10 };
  return { total: (g("mins") || 5) * 60 + (g("secs") || 0) };
}

function ui(label, timeTxt, roundTxt, p) {
  $("phase").textContent = label;
  $("time").textContent = timeTxt;
  $("round").textContent = roundTxt || "";
  $("fill").style.width = `${Math.max(0, Math.min(1, p)) * 100}%`;
}

function finish(msg) {
  clearInterval(intv); intv = null;
  setView("finish");
  $("finishMsg").textContent = msg;
}

function startMain() {
  if (mode === "tabata") {
    phase = "work"; round = 1; total = cfg.rounds;
    left = cfg.work; dur = cfg.work;
    ui("Trabajo", left, `Ronda ${round}/${total}`, 0);
  }
  if (mode === "amrap") {
    left = cfg.total; dur = cfg.total;
    ui("AMRAP", fmt(left), "", 0);
  }
  if (mode === "emom") {
    round = 1; total = cfg.rounds;
    left = cfg.roundSecs; dur = cfg.roundSecs;
    ui("EMOM", fmt(left), `Ronda ${round}/${total} · ${cfg.roundSecs / 60} min`, 0);
  }
  if (mode === "countdown") {
    left = cfg.total; dur = cfg.total;
    ui("Cuenta atrás", fmt(left), "", 0);
  }
  intv = setInterval(tick, 1000);
}

function start() {
  cfg = readCfg(); paused = false; setView("timer");
  let prep = 3;
  ui("Prepárate", prep, "", 1);
  clearInterval(intv);
  intv = setInterval(() => {
    prep--;
    if (prep <= 0) { clearInterval(intv); startMain(); return; }
    ui("Prepárate", prep, "", 1);
  }, 1000);
}

function tick() {
  if (paused) return;

  // TABATA
  if (mode === "tabata") {
    left--;
    if (left <= 0) {
      if (phase === "work") {
        phase = "rest"; left = cfg.rest; dur = cfg.rest;
        ui("Descanso", left, `Ronda ${round}/${total}`, 0); return;
      }
      round++;
      if (round > total) { finish(`${total} rounds completados`); return; }
      phase = "work"; left = cfg.work; dur = cfg.work;
      ui("Trabajo", left, `Ronda ${round}/${total}`, 0); return;
    }
    ui(phase === "work" ? "Trabajo" : "Descanso", left, `Ronda ${round}/${total}`, 1 - left / dur);
    return;
  }

  // EMOM — cuenta atrás por ronda, avanza ronda al llegar a 0
  if (mode === "emom") {
    left--;
    if (left <= 0) {
      round++;
      if (round > total) { finish(`${total} rondas completadas`); return; }
      left = cfg.roundSecs; dur = cfg.roundSecs;
      ui("EMOM", fmt(left), `Ronda ${round}/${total} · ${cfg.roundSecs / 60} min`, 0);
      return;
    }
    ui("EMOM", fmt(left), `Ronda ${round}/${total} · ${cfg.roundSecs / 60} min`, 1 - left / dur);
    return;
  }

  // AMRAP y COUNTDOWN — cuenta atrás total
  left--;
  if (left <= 0) {
    finish(mode === "countdown" ? "Cuenta atrás completada" : "Tiempo completado"); return;
  }
  if (mode === "amrap")     ui("AMRAP", fmt(left), "", 1 - left / dur);
  if (mode === "countdown") ui("Cuenta atrás", fmt(left), "", 1 - left / dur);
}

document.querySelectorAll(".mode").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".mode").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  mode = b.dataset.mode;
  renderFields();
}));

$("startBtn").addEventListener("click", start);
$("pauseBtn").addEventListener("click", () => {
  paused = !paused;
  $("pauseBtn").textContent = paused ? "Reanudar" : "Pausar";
});
$("stopBtn").addEventListener("click", () => { clearInterval(intv); intv = null; setView("setup"); });
$("againBtn").addEventListener("click", () => setView("setup"));

renderFields();
</script>
</body>
</html>
